name: Build BikBot
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DLL
        # This command manually compiles the file without needing a project file
        run: cl.exe /LD src/dllmain.cpp /Fe:bikbotclient.dll
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: bikbotclient
          path: "*.dll"
